{% extends 'articles/base.html' %}
{% block content %}
  <h2>Новини</h2>
  {% for article in articles %}
    <div class="card mb-3">
      {% if article.image %}
        <img src="{{ article.image.url }}" class="card-img-top" style="max-height: 300px;">
      {% endif %}
      <div class="card-body">
        <h5><a href="{% url 'article_detail' article.pk %}">{{ article.title }}</a></h5>
        <p>{{ article.content|truncatechars:200 }}</p>
      </div>
    </div>
  {% endfor %}
{% endblock %}
